<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyClear - Onderzoek naar veroudering</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header-shell">
      <div class="header-left">
        <img
          class="logo-small"
          src="assets/skyclear-logo.png"
          alt="SkyClear logo"
          onerror="this.style.display='none'"
        />
        <h1>SkyClear</h1>
      </div>
      <nav class="top-tabs" aria-label="Tabbladen">
        <a class="tab" href="index.html">CO2 Calculator</a>
        <a class="tab active" href="onderzoek.html">Onderzoek</a>
        <a class="tab" href="recyclage.html">Recyclage</a>
        <a class="tab" href="disclaimer.html">Disclaimer</a>
      </nav>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
    </header>

    <main class="main-wrap">
      <section class="card">
        <div class="card-title">Onderzoek naar veroudering</div>
        <p class="subtitle">Deze pagina wordt binnenkort gevuld met analyses op basis van vlootleeftijd en trenddata.</p>
        <div class="coming-soon">
          <h2>Coming soon</h2>
          <p>Inhoud wordt hier binnenkort toegevoegd.</p>
        </div>
      </section>
    </main>

    <script>
      const btn = document.getElementById("themeToggle");
      if (localStorage.getItem("skyclear-theme") === "dark") document.body.classList.add("dark");
      btn.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        localStorage.setItem("skyclear-theme", document.body.classList.contains("dark") ? "dark" : "light");
      });
    </script>
  </body>
</html>
